<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 核心基础配置（通用网站必备） -->
    <meta charset="UTF-8">
    <!-- 适配IE浏览器 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- 适配手机/平板等移动端，禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <!-- 自定义网站信息（你可按需修改） -->
    <meta name="description" content="你的网站描述 - 比如「个人技术分享站，聚焦机械设计、视觉设备装调、电控维修领域」">
    <meta name="keywords" content="机械设计, SolidWorks, CCD视觉设备, 电控维修">
    <!-- 网站主题色（移动端浏览器顶部栏颜色） -->
    <meta name="theme-color" content="#2c3e50">

    <!-- 社交分享优化（可选，比如分享到微信/微博时显示的信息） -->
    <meta property="og:title" content="你的网站标题">
    <meta property="og:type" content="website">
    <meta property="og:description" content="和上面的description一致即可">
    <!-- 可选：替换为你的网站封面图（上传到仓库img文件夹后改路径） -->
    <meta property="og:image" content="https://youhunwangluo.github.io/mijk.github.io/img/183794_p0.ico">
    <meta property="og:url" content="https://youhunwangluo.github.io/mijk.github.io/">
    <meta property="og:site_name" content="你的网站名称">

    <!-- 网站标题（浏览器标签显示） -->
    <title>无聊的站点</title>

    <!-- 通用基础样式（解决排版问题，适配所有内容类型） -->
    <style>
        /* 全局重置：消除不同浏览器默认样式差异 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 基础字体：适配中文，行高舒适 */
        body {
            font-family: "微软雅黑", "Microsoft Yahei", Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        /* 通用标题样式（层级清晰） */
        h1 { font-size: 28px; color: #2c3e50; margin: 20px 0; }
        h2 { font-size: 24px; color: #34495e; margin: 18px 0; }
        h3 { font-size: 20px; color: #4a6583; margin: 16px 0; }
        /* 通用文本/链接样式 */
        p { margin: 10px 0; font-size: 16px; }
        a { color: #3498db; text-decoration: none; }
        a:hover { color: #2980b9; text-decoration: underline; }
        /* 通用列表样式 */
        ul, ol { margin: 10px 0 10px 30px; }
        li { margin: 8px 0; }
        /* 通用容器样式（可用来分板块） */
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
    </style>
</head>
